name: Code Quality

on:
  pull_request:
  workflow_dispatch:
jobs:
  lint:
    name: Code Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
      - run: uv python install 3.11
      - run: make
      - run: make check
      - run: make mypy
